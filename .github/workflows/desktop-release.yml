# Builds the Wardrobe desktop app (local-data mode, Tauri shell) on GitHub's
# cloud machines and — on version tags — publishes the installers to a
# GitHub Release. Nothing is built on anyone's personal computer.
#
# Two triggers:
#   • push a tag like `desktop-v0.1.0`  → build + create a Release with the
#     Windows installer and the macOS .dmg attached (the page to send friends)
#   • Actions tab → "Run workflow"      → build only (artifacts, no Release),
#     for testing the pipeline
#
# Note: the installers are unsigned — Windows SmartScreen / macOS Gatekeeper
# will show a one-time "unknown developer" warning. Expected; documented in
# the README.

name: desktop-release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # to create the Release + upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            # One .dmg that runs on both Apple Silicon and Intel Macs.
            args: '--target universal-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Use npm 11
        # The committed package-lock.json was generated by npm 11, which no
        # longer records optional peer deps (vite 8's esbuild). The runner's
        # bundled npm 10 rejects that lock as out-of-sync, so pin npm 11 here.
        run: npm install -g npm@11

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install JS dependencies
        working-directory: app
        run: npm ci

      - name: Build (and release on tags)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          # Only create/attach to a Release when this run came from a tag.
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && 'Wardrobe Desktop __VERSION__' || '' }}
          releaseBody: |
            Wardrobe for your computer — your journal lives on your own machine. No account needed.

            **Windows:** download the `.msi` (or `-setup.exe`), double-click, and if Windows shows
            "Windows protected your PC", click **More info → Run anyway** (one time only).

            **Mac:** download the `.dmg`, open it, and drag Wardrobe into Applications. If macOS
            complains about an unidentified developer: right-click the app → **Open** (one time only).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload build artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: wardrobe-desktop-${{ matrix.platform }}
          path: |
            app/src-tauri/target/**/release/bundle/msi/*.msi
            app/src-tauri/target/**/release/bundle/nsis/*.exe
            app/src-tauri/target/**/release/bundle/dmg/*.dmg
            app/src-tauri/target/release/bundle/msi/*.msi
            app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore
