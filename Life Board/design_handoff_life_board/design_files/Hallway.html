<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hallway — Pawprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #efe7d6;
    --bg-2: #e4d8bf;
    --ink: #2b2419;
    --ink-soft: #5a4f3c;
    --ink-faint: #8a7d63;
    --line: #2b241955;
    --accent: #7a6a3a;
    --glow: 255, 224, 150;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    max-height: 100vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ---------------- Seal (date) top-left ---------------- */
  .seal {
    position: fixed; top: 28px; left: 32px; z-index: 5;
    width: 84px; height: 84px;
    border-radius: 50%;
    border: 1.2px solid var(--ink-soft);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--ink-soft);
    font-family: 'Cormorant Garamond', serif;
    line-height: 1;
    transform: rotate(-6deg);
    animation: dawn 2000ms ease-out both;
  }
  .seal::before {
    content: ""; position: absolute; inset: 5px;
    border-radius: 50%;
    border: 0.5px dashed var(--ink-soft);
    opacity: 0.5;
  }
  .seal .m { font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; }
  .seal .d { font-size: 26px; font-weight: 500; margin-top: 4px; letter-spacing: 0.02em; }
  .seal .y { font-size: 9px; letter-spacing: 0.26em; margin-top: 4px; color: var(--ink-faint); }

  /* ---------------- Stage ---------------- */
  .stage {
    flex: 1;
    position: relative;
    width: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 0 20px;
    min-height: 0;
  }
  .stage-inner {
    position: relative;
    width: min(92vw, 78vh * 16 / 12, 1100px);
    aspect-ratio: 16 / 12;
  }

  /* ---------------- Spheres ---------------- */
  .sphere {
    position: absolute;
    border-radius: 50%;
    background: transparent;
    border: 1.4px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    color: var(--ink);
    transition: box-shadow 900ms ease, background 600ms ease, border-color 600ms ease, transform 900ms cubic-bezier(.2,.6,.2,1);
    animation: dawn 1800ms ease-out both;
    --prox: 0; /* 0–1 cursor-proximity warmth */
    will-change: transform, box-shadow;
  }
  /* ambient breathing halo behind every sphere */
  .sphere::before {
    content: ""; position: absolute; inset: -12%;
    border-radius: 50%;
    background: radial-gradient(closest-side, rgba(var(--glow), 0.35), rgba(var(--glow), 0) 70%);
    opacity: calc(0.35 + var(--prox) * 0.55);
    filter: blur(6px);
    pointer-events: none;
    animation: breathe 9s ease-in-out infinite;
    transition: opacity 700ms ease;
  }
  .sphere::after {
    content: ""; position: absolute; inset: 3px;
    border-radius: 50%;
    border: 0.6px solid var(--ink-soft);
    opacity: calc(0.35 + var(--prox) * 0.35);
    pointer-events: none;
    transition: opacity 600ms ease;
  }
  .sphere .inner { padding: 6px 14px; }
  .sphere .label {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.1;
    white-space: nowrap;
    letter-spacing: 0.04em;
  }
  .sphere .sub {
    display: block;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--ink-faint);
    margin-top: 6px;
    letter-spacing: 0.02em;
    opacity: 0;
    transform: translateY(-2px);
    transition: opacity 600ms ease, transform 600ms ease;
  }

  .sphere:hover, .sphere:focus-visible {
    outline: none;
    box-shadow: 0 0 110px 18px rgba(var(--glow), 0.6),
                inset 0 0 80px 0 rgba(var(--glow), 0.5);
    background: color-mix(in oklab, var(--bg-2) 55%, transparent);
    border-color: var(--ink);
  }
  .sphere:hover::after, .sphere:focus-visible::after { opacity: 0.8; }
  .sphere:hover .sub, .sphere:focus-visible .sub { opacity: 1; transform: translateY(0); }
  .sphere:active { transform: scale(0.985); }
  .sphere.big:hover    { transform: translate(-50%, -50%) scale(1.02); }
  .sphere.small.s-wonder:hover { transform: translateX(-50%) scale(1.03); }
  .sphere.small:not(.s-wonder):hover { transform: scale(1.03); }

  .sphere.big   { width: 30%; aspect-ratio: 1; }
  .sphere.small { width: 18%; aspect-ratio: 1; }

  .sphere.big   .label { font-size: clamp(24px, 2.6vw, 34px); }
  .sphere.big   .sub   { font-size: clamp(12px, 1.1vw, 15px); }
  .sphere.small .label { font-size: clamp(13px, 1.3vw, 18px); }
  .sphere.small .sub   { font-size: clamp(10px, 0.9vw, 12px); }

  /* Pawprint layout — Sanctuary is large & centered horizontally
     directly under Wonder Room (which sits at top-center).
     Timeline & Workshop are symmetric around 50%. */
  .s-sanctuary { left: 50%; top: 58%; transform: translate(-50%, -50%); }
  .s-timeline  { left: 16%;  top: 22%; }
  .s-wonder    { left: 50%;  top: 12%; transform: translateX(-50%); }
  .s-workshop  { right: 16%; top: 22%; }

  /* A very quiet hairline to suggest the arc, optional */
  .archline {
    position: absolute; inset: 0; pointer-events: none;
    opacity: var(--archline-opacity, 0.35);
    transition: opacity 600ms ease;
  }

  /* Quiet footer epigraph */
  .epigraph {
    text-align: center;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--ink-faint);
    letter-spacing: 0.02em;
    padding: 0 32px 40px;
    animation: dawn 2400ms ease-out both;
    animation-delay: 1400ms;
  }

  /* Entrance — opacity + blur only, so positioning transforms survive */
  @keyframes dawn {
    0%   { opacity: 0; filter: blur(8px); }
    100% { opacity: 1; filter: blur(0);   }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(0.92); opacity: var(--breath-lo, 0.25); }
    50%      { transform: scale(1.12); opacity: var(--breath-hi, 0.7); }
  }

  /* Threshold transition — clicking a sphere */
  .entering { pointer-events: none; }
  .entering .sphere:not(.is-entering) {
    opacity: 0.08;
    filter: blur(6px);
    transition: opacity 1200ms ease, filter 1200ms ease;
  }
  .entering .seal, .entering .epigraph, .entering .archline {
    opacity: 0;
    transition: opacity 900ms ease;
  }
  .sphere.is-entering {
    z-index: 5;
    transition: transform 5200ms cubic-bezier(.25,.5,.2,1), box-shadow 4000ms ease, border-color 3000ms ease, background 3600ms ease;
    border-color: transparent;
    background: radial-gradient(closest-side, rgba(var(--glow), 0.95), color-mix(in oklab, var(--bg) 70%, rgba(var(--glow),0.4)) 75%);
    box-shadow: 0 0 220px 60px rgba(var(--glow), 0.7),
                inset 0 0 140px 0 rgba(var(--glow), 0.7);
  }
  .sphere.is-entering::after { opacity: 0; }
  .sphere.is-entering::before { opacity: 0.9; }
  /* Hide text immediately — avoids blurring under transform */
  .sphere.is-entering .inner {
    opacity: 0;
    transition: opacity 500ms ease;
  }

  /* Threshold overlay (after the sphere expands) */
  .threshold {
    position: fixed; inset: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    background: radial-gradient(ellipse at center, color-mix(in oklab, var(--bg) 50%, rgba(var(--glow), 0.5)) 0%, var(--bg) 70%);
    opacity: 0;
    transition: opacity 3200ms ease;
    pointer-events: none;
  }
  .threshold.visible { opacity: 1; pointer-events: auto; }
  .threshold .room-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(38px, 5vw, 64px);
    letter-spacing: 0.08em;
    color: var(--ink);
    margin: 0;
  }
  .threshold .room-sub {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: clamp(14px, 1.2vw, 18px);
    color: var(--ink-faint);
    margin-top: 8px;
    letter-spacing: 0.06em;
  }
  .threshold .entering-word {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    color: var(--ink-faint);
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeInSlow 1400ms ease-out 400ms forwards;
  }
  .threshold .return {
    margin-top: 40px;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    background: transparent;
    border: 0; border-bottom: 1px solid var(--line);
    padding: 4px 2px;
    cursor: pointer;
    opacity: 0;
    animation: fadeInSlow 1400ms ease-out 1400ms forwards;
  }
  .threshold .return:hover { color: var(--ink); border-bottom-color: var(--ink); }
  @keyframes fadeInSlow { to { opacity: 1; } }

  @media (prefers-reduced-motion: reduce) {
    .sphere::before { animation: none; }
    .sphere, .sphere.is-entering, .threshold { transition-duration: 300ms !important; }
    @keyframes dawn { 0%,100% { opacity: 1; filter: none; } }
  }
  .s-wonder    { animation-delay: 250ms; }
  .s-timeline  { animation-delay: 600ms; }
  .s-workshop  { animation-delay: 900ms; }
  .s-sanctuary { animation-delay: 1200ms; }



  /* ---------------- Tweaks panel ---------------- */
  .tweaks {
    position: fixed;
    right: 24px; bottom: 24px;
    width: 280px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    padding: 18px 18px 16px;
    font-family: 'EB Garamond', serif;
    color: var(--ink);
    display: none;
    z-index: 40;
    box-shadow: 0 12px 40px -20px rgba(0,0,0,0.25);
  }
  .tweaks.visible { display: block; }
  .tweaks h3 {
    margin: 0 0 12px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 16px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
  }
  .tweaks .row { margin: 10px 0; }
  .tweaks label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .tweaks input[type="text"] {
    width: 100%;
    background: transparent;
    border: 0; border-bottom: 1px solid var(--line);
    padding: 4px 0 6px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; color: var(--ink);
    outline: none;
  }
  .tweaks input[type="text"]:focus { border-bottom-color: var(--ink); }
  .tweaks input[type="range"] { width: 100%; accent-color: var(--ink-soft); }
  .tweaks .seg { display: inline-flex; gap: 0; border: 1px solid var(--line); border-radius: 999px; padding: 3px; }
  .tweaks .seg button {
    font-family: 'EB Garamond', serif;
    font-size: 12px; letter-spacing: 0.06em;
    padding: 5px 10px; border: 0; background: transparent;
    color: var(--ink-soft); cursor: pointer; border-radius: 999px;
  }
  .tweaks .seg button[aria-pressed="true"] {
    background: var(--ink); color: var(--bg);
  }
  .tweaks .hint {
    font-style: italic; font-size: 12px; color: var(--ink-faint);
    margin-top: 14px; border-top: 1px dashed var(--line); padding-top: 10px;
  }

</style>
</head>
<body>

  <!-- Date seal -->
  <aside class="seal" aria-label="Today's date">
    <div class="m" id="seal-m">APR</div>
    <div class="d" id="seal-d">19</div>
    <div class="y" id="seal-y">A·D 2026</div>
  </aside>

  <!-- Stage -->
  <main class="stage">
    <div class="stage-inner">
      <svg class="archline" viewBox="0 0 1000 700" preserveAspectRatio="none" aria-hidden="true">
        <path id="archPath" d="M160 200 Q 500 40 840 200" fill="none"
              stroke="currentColor" stroke-width="0.8"
              stroke-dasharray="3 6" opacity="0.5" style="color: var(--ink-faint)"/>
      </svg>

      <a class="sphere small s-wonder" href="#" data-door="wonder" data-roomsub="open questions, thought together">
        <div class="inner">
          <div class="label" data-name="wonder">Wonder Room</div>
          <span class="sub">open questions</span>
        </div>
      </a>

      <a class="sphere small s-timeline" href="#" data-door="timeline" data-roomsub="a life, on one line">
        <div class="inner">
          <div class="label" data-name="timeline">Timeline</div>
          <span class="sub">life, in a line</span>
        </div>
      </a>

      <a class="sphere small s-workshop" href="#" data-door="workshop" data-roomsub="projects, made together">
        <div class="inner">
          <div class="label" data-name="workshop">Workshop</div>
          <span class="sub">projects, together</span>
        </div>
      </a>

      <a class="sphere big s-sanctuary" href="#" data-door="sanctuary" data-roomsub="scripture &amp; prayer">
        <div class="inner">
          <div class="label" data-name="sanctuary">Sanctuary</div>
          <span class="sub">scripture &amp; prayer</span>
        </div>
      </a>
    </div>
  </main>

  <div class="epigraph" id="epigraph">
    “Be still, and know.”
  </div>

  <!-- Threshold overlay for the click-to-enter transition -->
  <div class="threshold" id="threshold" aria-hidden="true">
    <div class="entering-word">Entering</div>
    <h1 class="room-name" id="room-name">Sanctuary</h1>
    <div class="room-sub" id="room-sub">scripture &amp; prayer</div>
    <button class="return" id="return-btn">← return to the hallway</button>
  </div>

  <!-- Tweaks panel (hidden unless host activates) -->
  <aside class="tweaks" id="tweaks" aria-label="Tweaks">
    <h3>Tweaks</h3>

    <div class="row">
      <label>Arc guideline</label>
      <div class="seg" role="group" aria-label="Arc guideline">
        <button data-arc="on"  aria-pressed="true">Show</button>
        <button data-arc="off" aria-pressed="false">Hide</button>
      </div>
    </div>

    <div class="row">
      <label>Sanctuary size</label>
      <input type="range" id="tw-sanctuary-size" min="22" max="40" step="1" />
    </div>

    <div class="row">
      <label>Outer doors spread</label>
      <input type="range" id="tw-spread" min="8" max="28" step="1" />
    </div>

    <div class="row">
      <label>Epigraph</label>
      <input type="text" id="tw-epigraph" />
    </div>

    <div class="row">
      <label>Rename doors (optional)</label>
      <input type="text" id="tw-sanctuary" placeholder="Sanctuary" />
      <input type="text" id="tw-wonder"    placeholder="Wonder Room" style="margin-top:6px;" />
      <input type="text" id="tw-timeline"  placeholder="Timeline"   style="margin-top:6px;" />
      <input type="text" id="tw-workshop"  placeholder="Workshop"   style="margin-top:6px;" />
    </div>

    <div class="hint">Toggle the Tweaks switch in the toolbar to close.</div>
  </aside>

<script>
  // ----- Tweakable defaults (host-editable JSON) -----
  const TWEAKS = /*EDITMODE-BEGIN*/{
    "archline": true,
    "sanctuarySize": 29,
    "spread": 12,
    "epigraph": "“Be still, and know.”",
    "nameSanctuary": "Sanctuary",
    "nameWonder": "Wonder Room",
    "nameTimeline": "Timeline",
    "nameWorkshop": "Workshop"
  }/*EDITMODE-END*/;

  // ----- Date seal -----
  (function () {
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    const d = new Date();
    document.getElementById('seal-m').textContent = months[d.getMonth()];
    document.getElementById('seal-d').textContent = d.getDate().toString().padStart(2,'0');
    document.getElementById('seal-y').textContent = 'A·D ' + d.getFullYear();
  })();

  // ----- Apply tweak state to DOM -----
  const stageInner = document.querySelector('.stage-inner');
  const sanctuary = document.querySelector('.s-sanctuary');
  const timeline  = document.querySelector('.s-timeline');
  const workshop  = document.querySelector('.s-workshop');
  const wonder    = document.querySelector('.s-wonder');
  const archline  = document.querySelector('.archline');
  const epigraph  = document.getElementById('epigraph');

  function applyTweaks(t) {
    // Sanctuary size (percent width)
    sanctuary.style.width = t.sanctuarySize + '%';
    // Outer door spread (percent from edges)
    timeline.style.left  = t.spread + '%';
    workshop.style.right = t.spread + '%';
    // Arc line
    archline.style.opacity = t.archline ? 0.5 : 0;
    // Epigraph
    epigraph.textContent = t.epigraph || '';
    // Names
    const mapping = {
      sanctuary: t.nameSanctuary,
      wonder: t.nameWonder,
      timeline: t.nameTimeline,
      workshop: t.nameWorkshop,
    };
    Object.entries(mapping).forEach(([k, v]) => {
      const el = document.querySelector('.label[data-name="' + k + '"]');
      if (el && v) el.textContent = v;
    });
  }
  applyTweaks(TWEAKS);

  // ----- Tweak panel wiring -----
  const panel = document.getElementById('tweaks');
  const bySel = (s) => document.querySelector(s);

  function bindRange(id, key) {
    const input = document.getElementById(id);
    input.value = TWEAKS[key];
    input.addEventListener('input', () => {
      TWEAKS[key] = Number(input.value);
      applyTweaks(TWEAKS);
      pushEdit({ [key]: TWEAKS[key] });
    });
  }
  function bindText(id, key) {
    const input = document.getElementById(id);
    input.value = TWEAKS[key] || '';
    input.addEventListener('input', () => {
      TWEAKS[key] = input.value;
      applyTweaks(TWEAKS);
      pushEdit({ [key]: TWEAKS[key] });
    });
  }
  function bindSeg(selector, key, mapFn) {
    const btns = document.querySelectorAll(selector + ' button');
    btns.forEach(b => b.addEventListener('click', () => {
      const v = mapFn(b);
      TWEAKS[key] = v;
      btns.forEach(bb => bb.setAttribute('aria-pressed', bb === b ? 'true' : 'false'));
      applyTweaks(TWEAKS);
      pushEdit({ [key]: v });
    }));
    // init pressed state
    btns.forEach(b => {
      const v = mapFn(b);
      b.setAttribute('aria-pressed', v === TWEAKS[key] ? 'true' : 'false');
    });
  }

  bindRange('tw-sanctuary-size', 'sanctuarySize');
  bindRange('tw-spread', 'spread');
  bindText('tw-epigraph', 'epigraph');
  bindText('tw-sanctuary', 'nameSanctuary');
  bindText('tw-wonder',    'nameWonder');
  bindText('tw-timeline',  'nameTimeline');
  bindText('tw-workshop',  'nameWorkshop');
  bindSeg('.tweaks .seg', 'archline', (b) => b.dataset.arc === 'on');

  // ----- Cursor-proximity warmth -----
  // Each sphere lights gently as cursor nears. Computed each mousemove against sphere centers.
  const spheres = Array.from(document.querySelectorAll('.sphere'));
  const PROX_RADIUS = 280; // px
  document.addEventListener('mousemove', (e) => {
    for (const s of spheres) {
      const r = s.getBoundingClientRect();
      const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
      const d = Math.hypot(e.clientX - cx, e.clientY - cy);
      const t = Math.max(0, 1 - d / PROX_RADIUS);
      // ease curve so only close proximity glows
      s.style.setProperty('--prox', (t * t).toFixed(3));
    }
  }, { passive: true });
  document.addEventListener('mouseleave', () => {
    spheres.forEach(s => s.style.setProperty('--prox', 0));
  });

  // ----- Threshold transition: click a sphere -----
  const threshold = document.getElementById('threshold');
  const returnBtn = document.getElementById('return-btn');
  const roomName = document.getElementById('room-name');
  const roomSub  = document.getElementById('room-sub');

  function enterRoom(sphere) {
    if (document.body.classList.contains('entering')) return;
    document.body.classList.add('entering');
    sphere.classList.add('is-entering');

    // expand the sphere to fill the viewport
    const r = sphere.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const vw = window.innerWidth, vh = window.innerHeight;
    const dx = vw / 2 - cx;
    const dy = vh / 2 - cy;
    const targetSize = Math.hypot(vw, vh) * 1.1;
    const scale = targetSize / r.width;

    // preserve any existing positioning transform by overriding with absolute translate
    sphere.style.transition = 'transform 5200ms cubic-bezier(.25,.5,.2,1), box-shadow 4000ms ease, background 3600ms ease, border-color 3000ms ease';
    sphere.style.transformOrigin = 'center center';
    sphere.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;

    // fill threshold content from sphere data
    const name = sphere.querySelector('.label').textContent;
    const sub = sphere.dataset.roomsub || sphere.querySelector('.sub').textContent;
    roomName.textContent = name;
    roomSub.textContent = sub;

    setTimeout(() => {
      threshold.classList.add('visible');
      threshold.setAttribute('aria-hidden', 'false');
    }, 3200);
  }

  function returnToHallway() {
    threshold.classList.remove('visible');
    threshold.setAttribute('aria-hidden', 'true');
    const active = document.querySelector('.sphere.is-entering');
    if (active) {
      active.style.transform = '';
      // retriggers the CSS rule for the sphere's natural transform
    }
    setTimeout(() => {
      document.body.classList.remove('entering');
      if (active) active.classList.remove('is-entering');
      // clear inline transform overrides so CSS layout rules reassert
      if (active) {
        active.style.removeProperty('transform');
        active.style.removeProperty('transition');
        active.style.removeProperty('transform-origin');
      }
    }, 900);
  }

  spheres.forEach(s => {
    s.addEventListener('click', (e) => {
      e.preventDefault();
      enterRoom(s);
    });
  });
  returnBtn.addEventListener('click', returnToHallway);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && threshold.classList.contains('visible')) returnToHallway();
  });

  // ----- Host protocol for Tweaks toggle -----
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode')    panel.classList.add('visible');
    if (d.type === '__deactivate_edit_mode')  panel.classList.remove('visible');
  });
  function pushEdit(edits) {
    try {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    } catch (_) {}
  }
  // Announce only AFTER listener is in place
  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (_) {}
</script>
</body>
